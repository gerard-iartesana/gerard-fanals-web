    <style>
        .filter-btn {
            padding: 8px 20px;
            border: 1.5px solid var(--border-color);
            border-radius: 100px;
            background: transparent;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .filter-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .filter-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
    </style>
    <script>
        let allArticles = [];
        let activeFilter = 'Todos';

        function renderBlogGrid(articles) {
            const grid = document.getElementById('blog-grid');
            if (!grid) return;
            if (articles.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:var(--text-grey);grid-column:1/-1;padding:40px">No hay artículos en esta categoría.</p>';
                return;
            }
            grid.innerHTML = articles.map(a => `
                <article class="blog-card" onclick="window.location='articulo.html?slug=${a.slug || a.id}'">
                    <div class="blog-card-image">
                        <img src="${a.image}" alt="${a.title}" loading="lazy">
                    </div>
                    <div class="blog-card-body">
                        <div class="blog-card-tag">${a.tag}</div>
                        <h3>${a.title}</h3>
                        <p>${a.excerpt}</p>
                        <div class="blog-card-meta">
                            <span class="blog-date">${a.date || new Date(a.created_at).toLocaleDateString('es-ES', {day:'numeric',month:'long',year:'numeric'})}</span>
                            <span class="blog-read">${a.read_time || a.read}</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function renderFilters(articles) {
            const filtersEl = document.getElementById('blog-filters');
            const tags = ['Todos', ...new Set(articles.map(a => a.tag).filter(Boolean))];
            filtersEl.innerHTML = tags.map(tag =>
                `<button class="filter-btn${tag === activeFilter ? ' active' : ''}" onclick="filterByTag('${tag}')">${tag}</button>`
            ).join('');
        }

        function filterByTag(tag) {
            activeFilter = tag;
            renderFilters(allArticles);
            if (tag === 'Todos') {
                renderBlogGrid(allArticles);
            } else {
                renderBlogGrid(allArticles.filter(a => a.tag === tag));
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data, error } = await _supabase
                    .from('articles')
                    .select('*')
                    .eq('published', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                if (data && data.length > 0) {
                    allArticles = data;
                    renderFilters(data);
                    renderBlogGrid(data);
                    return;
                }
            } catch (e) {
                console.warn('Supabase no disponible, usando datos locales:', e.message);
            }
            // Fallback to local data
            if (typeof ARTICLES !== 'undefined') {
                allArticles = ARTICLES;
                renderFilters(ARTICLES);
                renderBlogGrid(ARTICLES);
            }
        });
    </script>
