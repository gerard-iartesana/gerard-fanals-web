<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias IA - Gerard Fanals</title>
    <meta name="description" content="Últimas noticias y artículos sobre inteligencia artificial, automatización y tecnología para negocios. Por Gerard Fanals.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="apple-nav">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="text-decoration:none;color:var(--text-main)">Gerard<span>Fanals</span></a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="blog.html">Noticias</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <a href="https://wa.me/34629494167?text=Hola%20Gerard,%20me%20gustaría%20hablar%20contigo" target="_blank" class="btn-apple-buy">Contactar</a>
            </div>
        </div>
    </nav>

    <section class="section blog-page">
        <div class="container">
            <div class="section-intro">
                <h1>Noticias</h1>
                <p>Artículos sobre inteligencia artificial, automatización y tecnología aplicada a negocios.</p>
            </div>

            <div class="blog-grid" id="blog-grid">
                <!-- Se carga dinámicamente desde articles-data.js -->
            </div>
        </div>
    </section>

    <!-- Pie de Página -->
    <div class="site-footer">
        <div class="container">
            <div class="footer-links">
                <a href="privacidad.html">Política de Privacidad</a>
                <span class="footer-dot">·</span>
                <a href="cookies.html">Cookies</a>
                <span class="footer-dot">·</span>
                <a href="terminos.html">Términos y Condiciones</a>
                <span class="footer-dot">·</span>
                <a href="admin.html">Dashboard</a>
            </div>
            <p class="footer-copyright">Creado por AISDI LLC @2026</p>
        </div>
    </div>

    <script src="articles-data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('blog-grid');
            if (grid && typeof ARTICLES !== 'undefined') {
                grid.innerHTML = ARTICLES.map(a => `
                    <article class="blog-card" onclick="window.location='articulo.html?id=${a.id}'">
                        <div class="blog-card-image">
                            <img src="${a.image}" alt="${a.title}" loading="lazy">
                        </div>
                        <div class="blog-card-body">
                            <div class="blog-card-tag">${a.tag}</div>
                            <h2>${a.title}</h2>
                            <p>${a.excerpt}</p>
                            <div class="blog-card-meta">
                                <span class="blog-date">${a.date}</span>
                                <span class="blog-read">${a.read}</span>
                            </div>
                        </div>
                    </article>
                `).join('');
            }
        });
    </script>
</body>
</html>
