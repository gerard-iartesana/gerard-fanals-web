    <script>
        function renderArticle(article) {
            const date = article.date || new Date(article.created_at).toLocaleDateString('es-ES', {day:'numeric',month:'long',year:'numeric'});
            document.getElementById('article-tag').textContent = article.tag;
            document.getElementById('article-title').textContent = article.title;
            document.getElementById('article-date').textContent = date;
            document.getElementById('article-read').textContent = article.read_time || article.read;
            document.getElementById('article-body').innerHTML = article.body;
            document.getElementById('article-hero').innerHTML = `<img src="${article.image}" alt="${article.title}">`;
            document.title = article.title + ' - Gerard Fanals';
            const desc = article.excerpt || article.title;
            document.querySelector('meta[name="description"]').setAttribute('content', desc);
            // Dynamic OG & Twitter
            document.querySelector('meta[property="og:title"]').setAttribute('content', article.title);
            document.querySelector('meta[property="og:description"]').setAttribute('content', desc);
            document.querySelector('meta[property="og:image"]').setAttribute('content', article.image || '');
            document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
            document.querySelector('meta[name="twitter:title"]').setAttribute('content', article.title);
            document.querySelector('meta[name="twitter:description"]').setAttribute('content', desc);
            document.querySelector('meta[name="twitter:image"]').setAttribute('content', article.image || '');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const id = params.get('id');

            // Try Supabase first
            if (slug && typeof _supabase !== 'undefined') {
                try {
                    const { data, error } = await _supabase
                        .from('articles')
                        .select('*')
                        .eq('slug', slug)
                        .single();

                    if (!error && data) {
                        renderArticle(data);
                        return;
                    }
                } catch (e) {
                    console.warn('Supabase fallback:', e.message);
                }
            }

            // Fallback: local data by id
            if (id && typeof ARTICLES !== 'undefined') {
                const article = ARTICLES.find(a => a.id == id);
                if (article) renderArticle(article);
            }
        });
    </script>
